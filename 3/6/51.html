<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
</head>
<body>
    <input type="text" id="display" readonly size="20"><br><br>

    <button onclick="num('1')">1</button>
    <button onclick="num('2')">2</button>
    <button onclick="num('3')">3</button>
    <button onclick="setOp('/')">/</button><br>
    
    <button onclick="num('4')">4</button>
    <button onclick="num('5')">5</button>
    <button onclick="num('6')">6</button>
    <button onclick="setOp('*')">*</button><br>
    
    <button onclick="num('7')">7</button>
    <button onclick="num('8')">8</button>
    <button onclick="num('9')">9</button>
    <button onclick="setOp('-')">-</button><br>
    
    <button onclick="num('0')">0</button>
    <button onclick="setOp('+')">+</button>
    <button onclick="calc()">=</button>
    <button onclick="clr()">C</button>

    <script>
        let display = document.getElementById('display');
        let current = '';
        let prev = null;
        let operation = null;

        function num(n) {
            current += n;
            display.value = current;
        }

        function setOp(op) {
            if (current === '') return;
            prev = parseFloat(current);
            operation = op;
            current = '';
            display.value = '';
        }

        function calc() {
            if (prev === null || current === '' || !operation) return;
            let b = parseFloat(current);
            let res;

            if (operation === '+') res = prev + b;
            else if (operation === '-') res = prev - b;
            else if (operation === '*') res = prev * b;
            else if (operation === '/') {
                if (b === 0) { 
					display.value = 'Ошибка'
					current = ''
					prev = null;
					operation = null
					return
				}
                res = prev / b;
            }

            display.value = res;
            current = res.toString();
            prev = null;
            operation = null;
        }

        function clr() {
            current = '';
            prev = null;
            operation = null;
            display.value = '';
        }
    </script>
</body>
</html>
